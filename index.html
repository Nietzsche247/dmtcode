    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        try {
          const stored = JSON.parse(localStorage.getItem('dmt-theme') || '{}');
          const modeStored = JSON.parse(localStorage.getItem('dmt-view-mode') || '{}');
          const mode = modeStored.state?.mode || 'research';
          
          // Research mode forces light
          if (mode === 'research') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#fafafa');
          } else {
            const theme = stored.state?.theme || 'system';
            const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.remove('light', 'dark');
            document.documentElement.classList.add(isDark ? 'dark' : 'light');
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', isDark ? '#050505' : '#fafafa');
          }
        } catch (e) {}
      })();
    </script>
