[build]
  publish = "dist"

# Edge functions run BEFORE the SPA fallback so crawlers and agents get real data.
[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[[edge_functions]]
  path = "/data.json"
  function = "data-json"

[[edge_functions]]
  path = "/registry/*"
  function = "content-prerender"

[[edge_functions]]
  path = "/trials/*"
  function = "content-prerender"

# SPA fallback for every other route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
