[build]
  publish = "dist"

# Bot logger runs FIRST so every crawler hit is captured before other logic.
[[edge_functions]]
  path = "/*"
  function = "bot-logger"

# Edge functions run BEFORE the SPA fallback so crawlers and agents get real data.
[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[[edge_functions]]
  path = "/data.json"
  function = "data-json"

[[edge_functions]]
  path = "/shop.json"
  function = "shop-json"

[[edge_functions]]
  path = "/"
  function = "content-prerender"

[[edge_functions]]
  path = "/registry"
  function = "content-prerender"

[[edge_functions]]
  path = "/registry/*"
  function = "content-prerender"

[[edge_functions]]
  path = "/trials"
  function = "content-prerender"

[[edge_functions]]
  path = "/trials/*"
  function = "content-prerender"

[[edge_functions]]
  path = "/bibliography"
  function = "content-prerender"

[[edge_functions]]
  path = "/dataset"
  function = "content-prerender"

[[edge_functions]]
  path = "/about"
  function = "content-prerender"

[[edge_functions]]
  path = "/critiques"
  function = "content-prerender"

[[edge_functions]]
  path = "/null-reports"
  function = "content-prerender"

[[edge_functions]]
  path = "/glossary"
  function = "content-prerender"

[[edge_functions]]
  path = "/methods"
  function = "content-prerender"

[[edge_functions]]
  path = "/open-questions"
  function = "content-prerender"

[[edge_functions]]
  path = "/research"
  function = "content-prerender"

[[edge_functions]]
  path = "/protocols"
  function = "content-prerender"

[[edge_functions]]
  path = "/forecasts"
  function = "content-prerender"

[[edge_functions]]
  path = "/protocol-guide"
  function = "content-prerender"

[[edge_functions]]
  path = "/prepare"
  function = "content-prerender"

[[edge_functions]]
  path = "/evidence-map"
  function = "content-prerender"

[[edge_functions]]
  path = "/faq"
  function = "content-prerender"

[[edge_functions]]
  path = "/bibliography/*"
  function = "content-prerender"

[[edge_functions]]
  path = "/card/*"
  function = "convergence-card"

# 404 guard MUST run last: it whitelists known routes and 404s the rest.
[[edge_functions]]
  path = "/*"
  function = "spa-guard"

# Permanent redirect: /tools ranking equity moves to /prepare.
[[redirects]]
  from = "/tools"
  to = "/prepare"
  status = 301
  force = true

# SPA fallback for every other route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
