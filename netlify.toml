[build]
  publish = "dist"

# Edge functions run BEFORE the SPA fallback so crawlers and agents get real data.
[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[[edge_functions]]
  path = "/data.json"
  function = "data-json"

[[edge_functions]]
  path = "/shop.json"
  function = "shop-json"

[[edge_functions]]
  path = "/registry/*"
  function = "content-prerender"

[[edge_functions]]
  path = "/trials/*"
  function = "content-prerender"

[[edge_functions]]
  path = "/prepare"
  function = "content-prerender"

[[edge_functions]]
  path = "/evidence-map"
  function = "content-prerender"

[[edge_functions]]
  path = "/faq"
  function = "content-prerender"

[[edge_functions]]
  path = "/card/*"
  function = "convergence-card"

# Permanent redirect: /tools ranking equity moves to /prepare.
[[redirects]]
  from = "/tools"
  to = "/prepare"
  status = 301
  force = true

# SPA fallback for every other route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
