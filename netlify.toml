[build]
  publish = "dist"

# Edge functions run BEFORE the SPA fallback, so crawlers get real HTML.
[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[[edge_functions]]
  path = "/registry/*"
  function = "symbol-prerender"

# SPA fallback for every other route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
