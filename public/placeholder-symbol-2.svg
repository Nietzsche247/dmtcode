<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" fill="#1a1a1a"/>
  <g stroke="#C41E3A" stroke-width="0.5" opacity="0.8">
    <!-- Hexagonal lattice with nested triangles -->
    <polygon points="50,15 75,30 75,55 50,70 25,55 25,30" fill="none"/>
    <polygon points="50,25 65,35 65,50 50,60 35,50 35,35" fill="none"/>
    <polygon points="50,35 55,40 55,47 50,52 45,47 45,40" fill="none"/>
    <!-- Inner triangles -->
    <polygon points="50,28 60,45 40,45" fill="none"/>
    <polygon points="50,55 60,40 40,40" fill="none"/>
    <!-- Connecting lines for depth -->
    <line x1="50" y1="15" x2="50" y2="70"/>
    <line x1="25" y1="30" x2="75" y2="55"/>
    <line x1="75" y1="30" x2="25" y2="55"/>
  </g>
  <rect x="5" y="5" width="90" height="90" stroke="#C41E3A" stroke-width="1" fill="none" opacity="0.3"/>
</svg>