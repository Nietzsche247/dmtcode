<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" fill="#1a1a1a"/>
  <g stroke="#C41E3A" stroke-width="0.5" opacity="0.8">
    <!-- 8-fold symmetry mandala -->
    <circle cx="50" cy="50" r="35" fill="none"/>
    <circle cx="50" cy="50" r="25" fill="none"/>
    <circle cx="50" cy="50" r="15" fill="none"/>
    <circle cx="50" cy="50" r="5" fill="none"/>
    <!-- 8 radiating lines -->
    <line x1="50" y1="15" x2="50" y2="85"/>
    <line x1="15" y1="50" x2="85" y2="50"/>
    <line x1="25" y1="25" x2="75" y2="75"/>
    <line x1="75" y1="25" x2="25" y2="75"/>
    <!-- Petal shapes -->
    <ellipse cx="50" cy="30" rx="8" ry="15" fill="none"/>
    <ellipse cx="50" cy="70" rx="8" ry="15" fill="none"/>
    <ellipse cx="30" cy="50" rx="15" ry="8" fill="none"/>
    <ellipse cx="70" cy="50" rx="15" ry="8" fill="none"/>
  </g>
  <rect x="5" y="5" width="90" height="90" stroke="#C41E3A" stroke-width="1" fill="none" opacity="0.3"/>
</svg>