<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" fill="#1a1a1a"/>
  <g stroke="#C41E3A" stroke-width="1" opacity="0.8">
    <!-- Binary vertical bars pattern -->
    <line x1="15" y1="20" x2="15" y2="80"/>
    <line x1="22" y1="35" x2="22" y2="65"/>
    <line x1="29" y1="20" x2="29" y2="80"/>
    <line x1="36" y1="20" x2="36" y2="80"/>
    <line x1="43" y1="35" x2="43" y2="65"/>
    <line x1="50" y1="20" x2="50" y2="80"/>
    <line x1="57" y1="35" x2="57" y2="65"/>
    <line x1="64" y1="35" x2="64" y2="65"/>
    <line x1="71" y1="20" x2="71" y2="80"/>
    <line x1="78" y1="35" x2="78" y2="65"/>
    <line x1="85" y1="20" x2="85" y2="80"/>
  </g>
  <!-- Horizontal reference lines -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#C41E3A" stroke-width="0.3" opacity="0.4"/>
  <rect x="5" y="5" width="90" height="90" stroke="#C41E3A" stroke-width="1" fill="none" opacity="0.3"/>
</svg>