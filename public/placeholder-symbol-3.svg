    <!-- DNA helix spiral pattern -->
    <path d="M30 15 Q50 25 70 15 Q50 35 30 25 Q50 45 70 35 Q50 55 30 45 Q50 65 70 55 Q50 75 30 65 Q50 85 70 75" fill="none"/>
    <path d="M70 15 Q50 25 30 15 Q50 35 70 25 Q50 45 30 35 Q50 55 70 45 Q50 65 30 55 Q50 75 70 65 Q50 85 30 75" fill="none"/>
    <!-- Connecting rungs -->
    <line x1="35" y1="20" x2="65" y2="20"/>
    <line x1="40" y1="30" x2="60" y2="30"/>
    <line x1="35" y1="40" x2="65" y2="40"/>
    <line x1="40" y1="50" x2="60" y2="50"/>
    <line x1="35" y1="60" x2="65" y2="60"/>
    <line x1="40" y1="70" x2="60" y2="70"/>
